<!DOCTYPE html>
<!-- v3 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MyMilesAI Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@500;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080B14;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Outfit',sans-serif}
.card{width:440px;padding:0 20px}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,#D6006E,#6C3CE0);display:inline-flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;font-family:'Syne',sans-serif;margin-bottom:12px}
.logo-name{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#E8EBF4}
.logo-name span{color:#D6006E}
.logo-sub{font-size:11px;color:#4A5068;margin-top:4px;letter-spacing:2px;text-transform:uppercase}
.box{background:#0D1117;border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:30px}
.row{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ttl{font-size:15px;font-weight:700;color:#E8EBF4}
.sub{font-size:11px;color:#4A5068}
.inp{width:100%;padding:14px 18px;background:#161B27;border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#E8EBF4;font-family:'JetBrains Mono',monospace;font-size:15px;outline:none;margin-bottom:12px;box-sizing:border-box}
.inp:focus{border-color:#D6006E}
.err{color:#EF4444;font-size:12px;margin-bottom:12px;display:none;padding:10px 14px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);border-radius:10px}
.btn{width:100%;padding:14px;border-radius:12px;border:none;color:#fff;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#D6006E,#6C3CE0)}
.note{text-align:center;margin-top:14px;font-size:11px;color:#4A5068;line-height:1.6}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">M</div>
    <div class="logo-name">MyMiles<span>AI</span></div>
    <div class="logo-sub">Admin Command Center</div>
  </div>
  <div class="box">
    <div class="row">
      <div class="ico" style="background:rgba(214,0,110,0.15);border:1px solid rgba(214,0,110,0.25)">&#128272;</div>
      <div><div class="ttl">Admin Login</div><div class="sub">Enter your administrator password</div></div>
    </div>
    <input type="password" id="pw" class="inp" placeholder="Admin password" onkeydown="if(event.key==='Enter')go()" autofocus>
    <div id="err" class="err">Incorrect password.</div>
    <button class="btn" onclick="go()">Enter Dashboard &rarr;</button>
  </div>
  <div class="note">&#128274; Authorized access only &middot; Session expires in 4h</div>
</div>
<script>
var P="Harijas2026";
function go(){
  if(document.getElementById("pw").value===P){
    sessionStorage.setItem("mma",Date.now()+14400000);
    window.location.href="dashboard.html";
  }else{
    document.getElementById("err").style.display="block";
    document.getElementById("pw").select();
  }
}
if(sessionStorage.getItem("mma")&&Date.now()<+sessionStorage.getItem("mma"))
  window.location.href="dashboard.html";
setTimeout(function(){document.getElementById("pw").focus();},100);
</script>
</body>
</html>
